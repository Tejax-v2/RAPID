<!doctype html>
<html lang="en">
<head>
  <title>Cameras</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <h2>Camera List</h2>
  <a href="/camera/add" class="btn btn-primary mb-4">Add Camera</a>
  <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
    {% for cam in cameras %}
    <div class="col">
      <div class="card h-100">
        <img src="/static/cameras/{{ cam.camera_id }}.jpg" class="card-img-top" alt="Camera {{ cam.camera_id }}">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">{{ cam.camera_id }}</h5>
          <a href="/camera/{{ cam.camera_id }}" class="btn btn-outline-primary mb-2">View</a>
          <form method="post" action="/camera/delete/{{ cam.camera_id }}" class="mt-auto">
            <button class="btn btn-danger w-100">Delete</button>
          </form>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
</body>
</html>
