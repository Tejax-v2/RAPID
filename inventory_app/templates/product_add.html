<!doctype html>
<html lang="en">
<head>
  <title>Add Product</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <h2>{{ 'Update Product' if product else 'Add Product' }}</h2>
  <form method="post" enctype="multipart/form-data">
    <div class="mb-3">
      <label class="form-label">Product ID</label>
      <input type="number" name="product_id" class="form-control" 
             {% if product %} value="{{ product.product_id }}" readonly {% else %} required {% endif %}>
    </div>
    <div class="mb-3">
      <label class="form-label">Product Name</label>
      <input type="text" name="product_name" class="form-control" value="{{ product.product_name if product else '' }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Product Image</label>
      <input type="file" name="product_image" class="form-control" {% if not product %} required {% endif %}>
    </div>
    <button class="btn btn-success">{{ 'Update Product' if product else 'Add Product' }}</button>
  </form>
</div>
</body>
</html>
