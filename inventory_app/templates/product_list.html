<!doctype html>
<html lang="en">
<head>
  <title>Products</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <h2>Product List</h2>
  <a href="/product/add" class="btn btn-primary mb-3">Add Product</a>
  <table class="table table-bordered">
    <thead>
      <tr>
        <th>Thumbnail</th> <!-- New column -->
        <th>Product ID</th>
        <th>Name</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
    {% for product in products %}
      <tr>
        <td>
            <img src="{{ url_for('static', filename='thumbnails/' + (product.product_id | string) + '.jpg') }}"
            alt="Thumbnail for {{ product.product_name }}"
            style="height: 60px;">       
        </td>
        <td>{{ product.product_id }}</td>
        <td>{{ product.product_name }}</td>
        <td>
          <a class="btn btn-sm btn-warning" href="/product/update/{{ product.product_id }}">Update</a>
          <form action="/product/delete/{{ product.product_id }}" method="post" class="d-inline">
            <button class="btn btn-sm btn-danger">Delete</button>
          </form>
        </td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
</div>
</body>
</html>
